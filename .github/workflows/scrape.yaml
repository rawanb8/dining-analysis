name: Daily Data Cleaning

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:  # manual trigger for testing

jobs:
  clean-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy textblob nltk
          python -m textblob.download_corpora

      - name: Run Guru cleaning
        working-directory: Cleaners
        run: python Cleaning_guru.py

      - name: Run TripAdvisor cleaning
        working-directory: Cleaners
        run: python Cleaning_tripadvisor.py

      - name: Commit cleaned files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cleaned/
          git diff --staged --quiet || git commit -m "Auto-clean data $(date +'%Y-%m-%d')"
          git push